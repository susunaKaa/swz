title: shiwenzhi 的主页
description: 一个现代化的个人主页
author: shiwenzhi
email: your.email@example.com
baseurl: "" 
url: "https://shiwenzhi.github.io"
twitter_username: yourtwitter
github_username: shiwenzhi
linkedin_username: yourlinkedin

theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

sass:
  sass_dir: _sass
  style: compressed

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
