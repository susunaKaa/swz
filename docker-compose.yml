version: '3.8'

services:
  jekyll:
    image: jekyll/jekyll:4.3
    container_name: jekyll-dev
    command: jekyll serve --watch --force_polling --incremental
    environment:
      - JEKYLL_ENV=development
    ports:
      - "4000:4000"
    volumes:
      - .:/srv/jekyll
      - jekyll_cache:/usr/local/bundle
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  jekyll_cache:
